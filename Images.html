<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bibliothèque d'Images - Concorde 3 S.A.</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'DM Sans', sans-serif; background: #f4f6f9; color: #1e293b; padding: 2rem 1rem; }
        .container { max-width: 1200px; margin: 0 auto; }
        header { margin-bottom: 3rem; padding-bottom: 1.5rem; border-bottom: 2px solid #e2e8f0; }
        header h1 { font-size: 2rem; font-weight: 700; color: #0f172a; }
        header p { color: #64748b; margin-top: .4rem; font-size: .95rem; }

        /* SECTIONS */
        .section { margin-bottom: 3rem; }
        .section-title {
            font-size: .75rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: .1em;
            margin-bottom: 1rem;
            padding-bottom: .5rem;
            border-bottom: 2px solid currentColor;
            display: inline-block;
        }
        .c-blue   { color: #2563eb; }
        .c-green  { color: #16a34a; }
        .c-indigo { color: #4f46e5; }
        .c-orange { color: #ea580c; }
        .c-slate  { color: #475569; }
        .c-yellow { color: #ca8a04; }
        .c-rose   { color: #e11d48; }
        .c-purple { color: #7c3aed; }

        /* GRILLE */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 1rem;
        }
        .card {
            background: #fff;
            border-radius: 12px;
            border: 1px solid #e2e8f0;
            overflow: hidden;
            box-shadow: 0 1px 3px rgba(0,0,0,.05);
            transition: box-shadow .2s, transform .2s;
        }
        .card:hover { box-shadow: 0 8px 24px rgba(0,0,0,.1); transform: translateY(-2px); }
        .card img {
            width: 100%;
            height: 150px;
            object-fit: cover;
            display: block;
            background: #f8fafc;
        }
        .card img.contain { object-fit: contain; padding: 1rem; }
        .card-name {
            padding: .5rem .75rem;
            font-size: .6rem;
            font-family: monospace;
            color: #94a3b8;
            background: #fafafa;
            border-top: 1px solid #f1f5f9;
            word-break: break-all;
            line-height: 1.4;
        }

        footer { margin-top: 4rem; padding-top: 1.5rem; border-top: 1px solid #e2e8f0; text-align: center; }
        footer a { color: #475569; text-decoration: none; font-size: .9rem; font-weight: 600; }
        footer a:hover { color: #4f46e5; }
    </style>
</head>
<body>

    <!-- BASE : BASE_URL -->
    <script>
        const BASE = "https://concorde3-images.vercel.app/";
        function img(name, contain) {
            return `<div class="card">
                <img src="${BASE}${name}" class="${contain ? 'contain' : ''}"
                     onerror="this.style.opacity='.15'" loading="lazy">
                <div class="card-name">${name}</div>
            </div>`;
        }
    </script>

    <!-- ========== IDENTITÉ VISUELLE ========== -->

    <div class="section">
